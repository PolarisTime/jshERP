# 服务端口
server:
  port: 9999
  servlet:
    # 登录超时 - 秒
    session:
      timeout: 36000s
    # 服务路径
    context-path: /jshERP-boot
  tomcat:
    # 文件上传临时路径
    basedir: /instance/jsh_steel/uploads

spring:
  main:
    allow-circular-references: true
  datasource:
    # 数据库连接
    url: jdbc:mysql://127.0.0.1:3306/jsh_erp_steel?useUnicode=true&characterEncoding=utf8&useCursorFetch=true&defaultFetchSize=500&allowMultiQueries=true&rewriteBatchedStatements=true&useSSL=false&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: jsh_steel
    password: jshM0mC6vU8mI4hA4ksteel
  redis:
    host: 127.0.0.1
    port: 16379
    password: C5PeuDAdHtIyU0DR
  servlet:
    multipart:
      # 文件上传限制 (byte)
      max-file-size: 10485760
      max-request-size: 10485760
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  # 开发热部署
  devtools:
    restart:
      enabled: true
      additional-paths: src/main/java
      exclude: static/**,mapper_xml/**

# mybatis-plus 配置
mybatis-plus:
  mapper-locations: classpath:./mapper_xml/*.xml

# 租户对应的角色 id
manage:
  roleId: 10

tenant:
  # 租户允许创建的用户数
  userNumLimit: 1000000
  # 租户允许试用的天数
  tryDayLimit: 3000

# 插件配置
plugin:
  runMode: prod
  pluginPath: plugins
  pluginConfigFilePath: pluginConfig

# 重量可编辑的商品类别ID（盘螺、线材等按实际过磅重量计算的类别）
erp:
  weight-editable-category-ids: 30,31,33,34

file:
  # 文件上传方式 1-本机 2-oss
  uploadType: 1
  # 文件上传根目录
  path: /instance/jsh_steel/uploads
  # 文件导出缓存
  exportTmp: /instance/jsh_steel/uploads/temp
  # 打印模板存放根目录
  printTemplatePath: /home/sakura/jshERP/printTemplates
